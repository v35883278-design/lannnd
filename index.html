<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Vacation | Exclusive Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '2407730473079217');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=2407730473079217&ev=PageView&noscript=1"
    /></noscript>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }

        h1, h2, .serif-font {
            font-family: 'Playfair Display', serif;
        }

        .bg-travel {
            background-image: url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transform: scale(1.05);
            animation: slowZoom 20s infinite alternate;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 50%, #000000 100%);
            z-index: -1;
        }

        @keyframes slowZoom {
            from { transform: scale(1.0); }
            to { transform: scale(1.1); }
        }

        .gold-bg {
            background: linear-gradient(90deg, #D4AF37 0%, #F2E39B 50%, #D4AF37 100%);
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-100 { animation-delay: 0.2s; }
        .delay-200 { animation-delay: 0.4s; }
        .delay-300 { animation-delay: 0.6s; }
        .delay-400 { animation-delay: 0.8s; }

        .firefly {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #D4AF37;
            border-radius: 50%;
            opacity: 0;
            animation: fly 5s infinite ease-in-out;
            box-shadow: 0 0 10px #D4AF37;
        }

        @keyframes fly {
            0% { transform: translate(0, 0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translate(var(--x), var(--y)); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between relative">

    <div class="bg-travel"></div>
    <div class="overlay"></div>

    <div id="particles-container" class="absolute inset-0 overflow-hidden pointer-events-none z-0"></div>

    <header class="relative z-10 p-6 flex justify-between items-center fade-in">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full border border-white/30 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white transform -rotate-45"><path d="M22 2L11 13"></path><path d="M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
            </div>
            <span class="text-xs font-bold tracking-[0.2em] uppercase text-white/90">Поїхали з нами</span>
        </div>
        <div class="px-3 py-1 bg-white/10 rounded-full border border-white/10 backdrop-blur-md">
            <span class="text-[10px] font-medium tracking-wider uppercase text-yellow-200">Exclusive Travel</span>
        </div>
    </header>

    <main class="relative z-10 flex-grow flex flex-col items-center justify-center px-6 text-center w-full max-w-lg mx-auto mt-[-40px]">
        
        <div class="mb-2 fade-in delay-100">
            <p class="text-yellow-400/80 text-xs uppercase tracking-[0.3em] mb-4">Відкрий світ розкоші</p>
            <h1 class="text-6xl md:text-7xl font-light italic leading-[0.9] text-white serif-font drop-shadow-2xl">
                ВІДПОЧИНОК<br>
                <span class="not-italic font-bold">МРІЇ</span>
            </h1>
        </div>

        <p class="text-gray-300 text-sm font-light mt-6 leading-relaxed max-w-xs mx-auto fade-in delay-200">
            Доступ до закритих цін та преміальних напрямків, які не доступні у відкритому пошуку.
        </p>

        <div class="mt-8 w-full fade-in delay-300">
            <div class="glass-card rounded-xl p-6 relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
                <div class="flex flex-col gap-2 items-center">
                    <span class="text-xs text-gray-400 uppercase tracking-widest">Тільки сьогодні</span>
                    <div class="text-3xl serif-font text-white">
                        Знижки до <span class="text-yellow-400 font-bold">-50%</span>
                    </div>
                    <div class="w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent my-2"></div>
                    <p class="text-[11px] text-gray-400">Мальдіви • Балі • Дубай • Домінікана</p>
                </div>
            </div>
        </div>

        <div class="w-full mt-6 fade-in delay-400 pb-8">
            <button onclick="handleCtaClick()" class="w-full py-4 gold-bg rounded-full shadow-[0_0_30px_rgba(212,175,55,0.3)] hover:shadow-[0_0_50px_rgba(212,175,55,0.5)] transition-all transform hover:-translate-y-1 active:scale-95 group relative overflow-hidden">
                <span class="relative z-10 text-black font-bold text-sm tracking-[0.2em] uppercase flex items-center justify-center gap-2">
                    Отримати Бонус
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:translate-x-1"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </span>
                <div class="absolute inset-0 bg-white/30 skew-x-12 -translate-x-full group-hover:animate-[shimmer_1s_infinite]"></div>
            </button>
            <p class="mt-4 text-[10px] text-gray-500/80">
                *Пропозиція діє обмежений час
            </p>
        </div>

    </main>

    <script>
        function handleCtaClick() {
            // Відправляємо подію Lead у Facebook
            if (typeof fbq === 'function') {
                fbq('track', 'Lead');
            }
            
            // Перенаправляємо в Telegram через невелику затримку, щоб піксель встиг спрацювати
            setTimeout(function() {
                window.location.href = "https://t.me/+i5tkfEHpLYlkZGFi";
            }, 100);
        }

        // Генерація "світлячків"
        const particlesContainer = document.getElementById('particles-container');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.classList.add('firefly');
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            const x = (Math.random() - 0.5) * 200 + 'px';
            const y = (Math.random() - 0.5) * 200 + 'px';
            particle.style.setProperty('--x', x);
            particle.style.setProperty('--y', y);
            particle.style.animationDelay = Math.random() * 5 + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
