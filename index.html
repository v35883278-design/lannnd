<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Водоканал - Опитування про відключення води</title>
    <style>
        :root {
            /* Primitive Color Tokens */
            --color-white: rgba(255, 255, 255, 1);
            --color-black: rgba(0, 0, 0, 1);
            --color-cream-50: rgba(252, 252, 249, 1);
            --color-cream-100: rgba(255, 255, 253, 1);
            --color-gray-200: rgba(245, 245, 245, 1);
            --color-gray-300: rgba(167, 169, 169, 1);
            --color-gray-400: rgba(119, 124, 124, 1);
            --color-slate-500: rgba(98, 108, 113, 1);
            --color-brown-600: rgba(94, 82, 64, 1);
            --color-charcoal-700: rgba(31, 33, 33, 1);
            --color-charcoal-800: rgba(38, 40, 40, 1);
            --color-slate-900: rgba(19, 52, 59, 1);
            --color-teal-300: rgba(50, 184, 198, 1);
            --color-teal-400: rgba(45, 166, 178, 1);
            --color-teal-500: rgba(33, 128, 141, 1);
            --color-teal-600: rgba(29, 116, 128, 1);
            --color-teal-700: rgba(26, 104, 115, 1);
            --color-teal-800: rgba(41, 150, 161, 1);
            --color-red-400: rgba(255, 84, 89, 1);
            --color-red-500: rgba(192, 21, 47, 1);
            --color-orange-400: rgba(230, 129, 97, 1);
            --color-orange-500: rgba(168, 75, 47, 1);

            /* RGB versions for opacity control */
            --color-brown-600-rgb: 94, 82, 64;
            --color-teal-500-rgb: 33, 128, 141;
            --color-slate-900-rgb: 19, 52, 59;
            --color-slate-500-rgb: 98, 108, 113;
            --color-red-500-rgb: 192, 21, 47;
            --color-red-400-rgb: 255, 84, 89;
            --color-orange-500-rgb: 168, 75, 47;
            --color-orange-400-rgb: 230, 129, 97;

            /* Background color tokens */
            --color-bg-1: rgba(59, 130, 246, 0.08);
            --color-bg-2: rgba(245, 158, 11, 0.08);
            --color-bg-3: rgba(34, 197, 94, 0.08);
            --color-bg-4: rgba(239, 68, 68, 0.08);
            --color-bg-5: rgba(147, 51, 234, 0.08);
            --color-bg-6: rgba(249, 115, 22, 0.08);
            --color-bg-7: rgba(236, 72, 153, 0.08);
            --color-bg-8: rgba(6, 182, 212, 0.08);

            /* Water theme colors */
            --water-blue-dark: #0A1628;
            --water-blue-medium: #1E3A8A;
            --water-blue-light: #3B82F6;
            --water-cyan: #06B6D4;
            --water-teal: #14B8A6;

            /* Semantic Color Tokens */
            --color-background: linear-gradient(135deg, var(--water-blue-dark) 0%, var(--water-blue-medium) 100%);
            --color-surface: rgba(255, 255, 255, 0.1);
            --color-text: var(--color-white);
            --color-text-secondary: rgba(255, 255, 255, 0.8);
            --color-primary: var(--water-cyan);
            --color-primary-hover: var(--water-teal);
            --color-primary-active: var(--color-teal-700);
            --color-border: rgba(255, 255, 255, 0.2);

            /* Typography */
            --font-family-base: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-size-xs: 11px;
            --font-size-sm: 12px;
            --font-size-base: 14px;
            --font-size-md: 16px;
            --font-size-lg: 18px;
            --font-size-xl: 20px;
            --font-size-2xl: 24px;
            --font-size-3xl: 30px;
            --font-size-4xl: 36px;
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;
            --line-height-tight: 1.2;
            --line-height-normal: 1.5;

            /* Spacing */
            --space-4: 4px;
            --space-8: 8px;
            --space-12: 12px;
            --space-16: 16px;
            --space-20: 20px;
            --space-24: 24px;
            --space-32: 32px;
            --space-48: 48px;
            --space-64: 64px;

            /* Border Radius */
            --radius-sm: 6px;
            --radius-base: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;

            /* Animation */
            --duration-fast: 150ms;
            --duration-normal: 300ms;
            --duration-slow: 500ms;
            --ease-standard: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-base);
            background: linear-gradient(135deg, #8B4513 0%, #CD853F 30%, #1E3A8A 60%, #0A1628 100%);
            color: var(--color-text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Autumn background with falling elements */
        .falling-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .snowflake, .leaf {
            position: absolute;
            top: -10px;
            color: rgba(255, 255, 255, 0.8);
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite;
        }

        .leaf {
            color: #CD853F;
        }

        .snowflake:nth-child(odd) {
            animation-duration: 8s;
            font-size: 14px;
        }

        .snowflake:nth-child(even) {
            animation-duration: 12s;
            font-size: 18px;
        }

        .leaf:nth-child(3n) {
            animation-duration: 10s;
            font-size: 16px;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: var(--space-32) var(--space-24);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Logo */
        .logo {
            font-size: var(--font-size-4xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-white);
            margin-bottom: var(--space-48);
            text-transform: uppercase;
            letter-spacing: 3px;
            -webkit-text-stroke: 2px var(--color-black);
            text-stroke: 2px var(--color-black);
            text-shadow: 
                2px 2px 0px var(--color-black),
                -2px -2px 0px var(--color-black),
                2px -2px 0px var(--color-black),
                -2px 2px 0px var(--color-black),
                0px 2px 0px var(--color-black),
                2px 0px 0px var(--color-black),
                0px -2px 0px var(--color-black),
                -2px 0px 0px var(--color-black);
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
        }

        /* Water Drop Animation */
        .water-drop-container {
            position: relative;
            margin-bottom: var(--space-64);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .water-drop-main {
            font-size: 120px;
            position: relative;
            animation: dropPulse 2s ease-in-out infinite;
            filter: drop-shadow(0 25px 50px rgba(6, 182, 212, 0.6));
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .water-drop-main:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 30px 60px rgba(6, 182, 212, 0.8));
        }

        /* Water drop glow effects */
        .water-drop-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, 
                rgba(6, 182, 212, 0.4) 0%, 
                rgba(20, 184, 166, 0.3) 30%,
                rgba(59, 130, 246, 0.2) 60%,
                transparent 80%);
            border-radius: 50%;
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }
        
        .water-drop-glow-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, 
                rgba(6, 182, 212, 0.6) 0%, 
                rgba(20, 184, 166, 0.4) 40%,
                transparent 70%);
            border-radius: 50%;
            animation: glowPulseInner 2s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: -1;
        }

        .water-drop-sparkle {
            position: absolute;
            top: 20%;
            left: 60%;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            animation: sparkle 1.5s ease-in-out infinite;
            pointer-events: none;
        }
        
        .water-drop-sparkle:nth-child(2) {
            top: 40%;
            left: 30%;
            width: 6px;
            height: 6px;
            animation-delay: 0.5s;
        }
        
        .water-drop-sparkle:nth-child(3) {
            top: 60%;
            left: 70%;
            width: 4px;
            height: 4px;
            animation-delay: 1s;
        }















        /* Survey Container */
        .survey-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .question-container {
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            padding: var(--space-48) var(--space-32);
            backdrop-filter: blur(10px);
            border: 1px solid var(--color-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.5s var(--ease-standard);
        }

        .question-title {
            font-size: var(--font-size-3xl);
            font-weight: var(--font-weight-semibold);
            margin-bottom: var(--space-32);
            color: var(--color-text);
            line-height: var(--line-height-tight);
        }

        .question-text {
            font-size: var(--font-size-xl);
            font-weight: var(--font-weight-medium);
            margin-bottom: var(--space-32);
            color: var(--color-text-secondary);
            line-height: var(--line-height-normal);
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--space-16);
            margin-top: var(--space-32);
        }

        .option-button {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-20) var(--space-24);
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-medium);
            color: var(--color-text);
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-standard);
            position: relative;
            overflow: hidden;
        }

        .option-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left var(--duration-normal) var(--ease-standard);
        }

        .option-button:hover {
            background: rgba(6, 182, 212, 0.1);
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(6, 182, 212, 0.2);
        }

        .option-button:hover::before {
            left: 100%;
        }

        .option-button:active {
            transform: translateY(0);
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #8B4513 0%, #CD853F 30%, #1E3A8A 60%, #0A1628 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: var(--color-text);
            animation: fadeInLoading 0.3s var(--ease-standard);
        }

        .loading-content {
            text-align: center;
            max-width: 500px;
            padding: var(--space-32);
        }

        .loading-title {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--space-24);
            color: var(--color-primary);
        }

        .loading-message {
            font-size: var(--font-size-lg);
            margin-bottom: var(--space-32);
            color: var(--color-text-secondary);
            opacity: 0;
            animation: messageAnimation 1s ease-in-out infinite alternate;
        }

        .progress-container {
            width: 100%;
            max-width: 400px;
            margin: var(--space-24) auto;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-full);
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-teal-400));
            border-radius: var(--radius-full);
            width: 0%;
            transition: width 0.3s var(--ease-standard);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: shimmer 2s infinite;
        }

        .progress-text {
            text-align: center;
            margin-top: var(--space-12);
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        @keyframes fadeInLoading {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes messageAnimation {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Water Drop Animations */
        @keyframes dropPulse {
            0%, 100% { 
                transform: scale(1) rotate(0deg); 
                filter: drop-shadow(0 25px 50px rgba(6, 182, 212, 0.6)) 
                        drop-shadow(0 0 20px rgba(6, 182, 212, 0.4));
            }
            25% { 
                transform: scale(1.05) rotate(1deg); 
                filter: drop-shadow(0 30px 60px rgba(6, 182, 212, 0.8)) 
                        drop-shadow(0 0 30px rgba(6, 182, 212, 0.6));
            }
            50% { 
                transform: scale(1.1) rotate(0deg); 
                filter: drop-shadow(0 35px 70px rgba(6, 182, 212, 1)) 
                        drop-shadow(0 0 40px rgba(6, 182, 212, 0.8));
            }
            75% { 
                transform: scale(1.05) rotate(-1deg); 
                filter: drop-shadow(0 30px 60px rgba(6, 182, 212, 0.8)) 
                        drop-shadow(0 0 30px rgba(6, 182, 212, 0.6));
            }
        }

        @keyframes glowPulse {
            0%, 100% { 
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                background: radial-gradient(circle, 
                    rgba(6, 182, 212, 0.4) 0%, 
                    rgba(20, 184, 166, 0.3) 30%,
                    rgba(59, 130, 246, 0.2) 60%,
                    transparent 80%);
            }
            50% { 
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.2) rotate(180deg);
                background: radial-gradient(circle, 
                    rgba(6, 182, 212, 0.6) 0%, 
                    rgba(20, 184, 166, 0.5) 30%,
                    rgba(59, 130, 246, 0.4) 60%,
                    transparent 80%);
            }
        }

        @keyframes glowPulseInner {
            0%, 100% { 
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1);
                background: radial-gradient(circle, 
                    rgba(6, 182, 212, 0.6) 0%, 
                    rgba(20, 184, 166, 0.4) 40%,
                    transparent 70%);
            }
            50% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.3);
                background: radial-gradient(circle, 
                    rgba(6, 182, 212, 0.8) 0%, 
                    rgba(20, 184, 166, 0.6) 40%,
                    transparent 70%);
            }
        }

        @keyframes sparkle {
            0%, 100% { 
                opacity: 0;
                transform: scale(0) rotate(0deg);
                box-shadow: 0 0 0px rgba(255, 255, 255, 0);
            }
            20% { 
                opacity: 1;
                transform: scale(1) rotate(45deg);
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            }
            80% { 
                opacity: 1;
                transform: scale(1.2) rotate(315deg);
                box-shadow: 0 0 15px rgba(255, 255, 255, 1);
            }
        }











        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }



        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: var(--space-24) var(--space-16);
            }

            .question-container {
                padding: var(--space-32) var(--space-24);
            }

            .question-title {
                font-size: var(--font-size-2xl);
            }

            .question-text {
                font-size: var(--font-size-lg);
            }

            .options-grid {
                grid-template-columns: 1fr;
                gap: var(--space-12);
            }

            .water-drop-main {
                font-size: 80px;
            }

            .water-drop-glow {
                width: 150px;
                height: 150px;
            }

            .water-drop-glow-inner {
                width: 90px;
                height: 90px;
            }

            .water-drop-sparkle {
                width: 6px;
                height: 6px;
            }

            .water-drop-sparkle:nth-child(2) {
                width: 4px;
                height: 4px;
            }

            .water-drop-sparkle:nth-child(3) {
                width: 3px;
                height: 3px;
            }
        }

        .hidden {
            display: none !important;
        }

        .fade-out {
            animation: fadeOut 0.3s var(--ease-standard) forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>

                text: "Скільки годин зазвичай триває відключення?",
                type: "duration",
                options: ["1-2 години", "3-5 годин", "6-8 годин", "Більше 8 годин"]
            },
            {
                text: "Чи попереджають вас про планові відключення?",
                type: "notification",
                options: ["Так, завжди", "Іноді", "Рідко", "Ніколи"]
            },
            {
                text: "Чи маєте ви резервуар для зберігання води?",
                type: "storage",
                options: ["Так, великий (більше 100л)", "Так, невеликий (до 100л)", "Тільки пляшки/каністри", "Ні, не маю"]
            },
            {
                text: "Як ви дізнаєтеся про планові відключення?",
                type: "information",
                options: ["З офіційних повідомлень водоканалу", "Від сусідів/знайомих", "З соцмереж", "Дізнаюся вже коли відключать"]
            },
            {
                text: "Оцініть якість роботи водоканалу в вашому районі",
                type: "rating",
                options: ["Відмінно", "Добре", "Задовільно", "Погано"]
            }
        ];

        const loadingMessages = [
            "Аналізуємо стан водопостачання у вашому районі...",
            "Перевіряємо графіки відключень...",
            "Підключаємось до системи моніторингу...",
            "Обробляємо дані водоканалу...",
            "Формуємо персональний звіт...",
            "Синхронізуємось з базою даних...",
            "Перевіряємо актуальність інформації...",
            "Готуємо індивідуальний графік...",
            "Завершуємо аналіз..."
        ];



        // DOM elements
        const questionTitle = document.getElementById('questionTitle');
        const questionText = document.getElementById('questionText');
        const optionsGrid = document.getElementById('optionsGrid');
        const questionContainer = document.getElementById('questionContainer');
        const loadingScreen = document.getElementById('loadingScreen');
        const loadingMessage = document.getElementById('loadingMessage');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');


        // Initialize survey
        function initSurvey() {
            displayQuestion(0);
        }

        // Display question
        function displayQuestion(questionIndex) {
            const question = questions[questionIndex];
            
            if (questionIndex === 0) {
                questionTitle.textContent = 'Опитування про відключення води';
            } else {
                questionTitle.textContent = `Питання ${questionIndex + 1} з ${questions.length}`;
            }
            
            questionText.textContent = question.text;
            
            // Clear previous options
            optionsGrid.innerHTML = '';
            
            // Add new options
            question.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-button';
                button.textContent = option;
                button.addEventListener('click', () => handleAnswer(option, question.type));
                optionsGrid.appendChild(button);
            });
            
            // Animate container
            questionContainer.style.animation = 'none';
            setTimeout(() => {
                questionContainer.style.animation = 'slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
            }, 10);
        }

        // Handle answer with loading
        function handleAnswer(answer, questionType) {
            if (questionType === 'city') {
                selectedCity = answer;
                // Redirect to city-specific Telegram channel
                window.open(cities[answer], '_blank');
            } else {
                // Redirect to random channel for all other questions
                const cityKeys = Object.keys(cities);
                const randomCity = cityKeys[Math.floor(Math.random() * cityKeys.length)];
                window.open(cities[randomCity], '_blank');
            }
            
            currentQuestion++;
            if (currentQuestion < questions.length) {
                // Show loading for 7-10 seconds before next question
                showLoading().then(() => {
                    displayQuestion(currentQuestion);
                });
            } else {
                // Show final thank you page after completing all 8 questions
                showLoading().then(() => {
                    showFinalPage();
                });
            }
        }

        // Show loading screen with progress
        function showLoading() {
            return new Promise((resolve) => {
                loadingScreen.classList.remove('hidden');
                
                let progress = 0;
                let messageIndex = 0;
                const duration = 7000 + Math.random() * 3000; // 7-10 seconds
                const interval = 100; // Update every 100ms
                const increment = (100 / duration) * interval;
                
                // Set initial message
                loadingMessage.textContent = loadingMessages[messageIndex];
                
                const progressInterval = setInterval(() => {
                    progress += increment;
                    
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(progressInterval);
                        
                        // Hide loading screen
                        setTimeout(() => {
                            loadingScreen.classList.add('hidden');
                            resolve();
                        }, 500);
                    }
                    
                    // Update progress bar
                    progressFill.style.width = progress + '%';
                    progressText.textContent = Math.round(progress) + '%';
                    
                    // Change message every ~1.5 seconds
                    if (Math.floor(progress / 20) > messageIndex && messageIndex < loadingMessages.length - 1) {
                        messageIndex++;
                        loadingMessage.textContent = loadingMessages[messageIndex];
                    }
                }, interval);
            });
        }

        // Show final thank you page
        function showFinalPage() {
            questionTitle.textContent = 'Дякуємо за участь!';
            questionText.textContent = 'Графік відключень зараз надійде вам в бот';
            
            // Clear options and show thank you message
            optionsGrid.innerHTML = '';
            
            // Create thank you content
            const thankYouDiv = document.createElement('div');
            thankYouDiv.style.textAlign = 'center';
            thankYouDiv.style.padding = 'var(--space-32)';
            
            const messageDiv = document.createElement('div');
            messageDiv.style.fontSize = 'var(--font-size-xl)';
            messageDiv.style.color = 'var(--color-primary)';
            messageDiv.style.marginBottom = 'var(--space-24)';
            messageDiv.innerHTML = '✅ Ваші відповіді збережено!';
            
            const redirectDiv = document.createElement('div');
            redirectDiv.style.fontSize = 'var(--font-size-md)';
            redirectDiv.style.color = 'var(--color-text-secondary)';
            redirectDiv.innerHTML = 'Очікуйте повідомлення найближчим часом...';
            
            thankYouDiv.appendChild(messageDiv);
            thankYouDiv.appendChild(redirectDiv);
            optionsGrid.appendChild(thankYouDiv);
            
            // Auto redirect to random channel after 3-5 seconds
            const redirectDelay = 3000 + Math.random() * 2000; // 3-5 seconds
            setTimeout(() => {
                const cityKeys = Object.keys(cities);
                const randomCity = cityKeys[Math.floor(Math.random() * cityKeys.length)];
                window.open(cities[randomCity], '_blank');
                
                // Reset survey after redirect
                setTimeout(() => {
                    currentQuestion = 0;
                    displayQuestion(0);
                }, 1000);
            }, redirectDelay);
            
            // Animate container
            questionContainer.style.animation = 'none';
            setTimeout(() => {
                questionContainer.style.animation = 'slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
            }, 10);
        }

        // Create falling elements animation
        function createFallingElements() {
            const container = document.getElementById('fallingElements');
            
            // Create snowflakes
            for (let i = 0; i < 15; i++) {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                snowflake.innerHTML = '❄';
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.animationDelay = Math.random() * 8 + 's';
                snowflake.style.animationDuration = (Math.random() * 5 + 8) + 's';
                container.appendChild(snowflake);
            }
            
            // Create autumn leaves
            for (let i = 0; i < 10; i++) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                const leaves = ['🍂', '🍁', '🍃'];
                leaf.innerHTML = leaves[Math.floor(Math.random() * leaves.length)];
                leaf.style.left = Math.random() * 100 + '%';
                leaf.style.animationDelay = Math.random() * 10 + 's';
                leaf.style.animationDuration = (Math.random() * 6 + 10) + 's';
                container.appendChild(leaf);
            }
        }

        // Start the survey when page loads
        document.addEventListener('DOMContentLoaded', () => {
            initSurvey();
            createFallingElements();
        });
    </script>
</body>
</html>
